
opcache.memory_consumption = 164  ;  164 MB of cache memory
opcache.max_wasted_percentage = 5 ; if 5% of the data is lost, the entire cache will be reset
opcache.max_accelerated_files = 32531 ; upon reaching the values ..of the values ..of the cache
opcache.use_cwd = 1 ; use the full path to create a unique key name
opcache.revalidate_freq = 0 ; checked to see if the file was changed on every request, does not
opcache.validate_timestamps = 1 ; when the file has not been verified until a reset () or serve
opcache.interned_strings_buffer = 32 ; 32 MB under strings cache

opcache.enable = 1
opcache.enable_cli = 1 ; enable OpCache for PHP CLI
